version: '3.8'

services:
  # 🐘 Container do PostgreSQL
  postgres-db:
    image: postgres:15-alpine
    container_name: inframonitor-postgres
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: InfraMonitorDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 🪟 Container do SQL Server
  sqlserver-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inframonitor-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SQLSERVER_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  postgres_data:
  sqlserver_data: